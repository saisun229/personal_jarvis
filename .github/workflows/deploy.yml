name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy-mcp-server:
    runs-on: ubuntu-latest
    concurrency: deploy-mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config services/mcp-server/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-agent-api:
    runs-on: ubuntu-latest
    concurrency: deploy-agent-api
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config apps/agent-api/fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
